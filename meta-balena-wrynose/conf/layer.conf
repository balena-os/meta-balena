BBPATH .= ":${LAYERDIR}"

BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "balena-wrynose"
BBFILE_PATTERN_balena-wrynose := "^${LAYERDIR}/"
BBFILE_PRIORITY_balena-wrynose = "1337"

LAYERSERIES_COMPAT_balena-wrynose = "wrynose"

DEPENDS:append:pn-go-runtime = " binutils-cross-aarch64"

# 2. Force the PATH to include the cross-toolchain directory
# This ensures that 'aarch64-poky-linux-ld' is visible to the compiler
export PATH:append:pn-go-runtime = ":${STAGING_BINDIR_TOOLCHAIN}"

# 3. The "Linker Alias" Fix
# Some Go versions call the linker as 'ld' rather than the prefixed version.
# This creates a safe symlink within the recipe's work directory.
do_compile:prepend:pn-go-runtime = " \
    if [ ! -e ${STAGING_BINDIR_TOOLCHAIN}/ld ]; then \
        ln -sf aarch64-poky-linux-ld ${STAGING_BINDIR_TOOLCHAIN}/ld; \
    fi \
"
