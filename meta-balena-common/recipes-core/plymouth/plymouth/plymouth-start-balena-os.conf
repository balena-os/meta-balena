[Unit]
Wants=
After=
Requires=

Wants=systemd-vconsole-setup.service systemd-udev-settle.service
After=systemd-udev-trigger.service systemd-udevd.service systemd-udev-settle.service resin-boot.service
Requires=resin-boot.service

[Service]
ExecStart=

Environment='CMDLINE=plymouth.ignore-serial-consoles splash'
ExecStart=/sbin/plymouthd --tty=tty1 --mode=boot --pid-file=/run/plymouth/pid --attach-to-session --kernel-command-line=${CMDLINE}
