# yaml-language-server: $schema=https://raw.githubusercontent.com/balena-os/balena-yocto-scripts/refs/heads/master/schemas/hostapp-composition.json
version: '2.4'
services:

  hostapp:
    image: __BUILD_OUTPUT__
    x-build: {}
    labels:
      io.balena.image.store: 'root'
      io.balena.image.class: 'hostapp'
      io.balena.update.requires-reboot: '1'
      io.balena.private.hostapp.board-rev: '__DEVICE_REPO_REV__'
